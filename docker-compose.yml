version: '3'

services:
  postgres:
    image: postgres:12
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama
    depends_on:
      - postgres
    volumes:
      - ./data/modules:/nakama/data/modules
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:5432 &&
        exec /nakama/nakama --name nakama1 --database.address postgres:5432
    ports:
      - "7350:7350"
      - "7351:7351"