services:
  postgres:
    image: postgres:12
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.16.0
    depends_on:
      - postgres
    volumes:
      - ./data/modules:/nakama/data/modules
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        sleep 10;
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama?sslmode=disable &&
        exec /nakama/nakama --name nakama1 --database.address postgres:localdb@postgres:5432/nakama?sslmode=disable --runtime.js_entrypoint match.js
    ports:
      - "7350:7350"
      - "7351:7351"